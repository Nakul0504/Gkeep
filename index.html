<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>G-Keep</title>
    <link rel="stylesheet" href="./src/styles/style.css" />
    <link rel="stylesheet" href="./src/styles/noteStyle.css" />
    <link href="https://fonts.cdnfonts.com/css/product-sans" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="topmenu">
      <div class="topmenu__menu-logo">
        <i
          class="fa fa-bars topmenu__menu"
          alt="mainmenu"
          title="mainmenu"
          aria-hidden="true"
        ></i>
        <img
          class="topmenu__logo"
          src="./src/images/gkeep_logo.png"
          alt="logo"
          title="Google Keep Logo"
        />
        <div class="topmenu__keep">Keep</div>
      </div>

      <div class="topmenu__searchbar">
        <input
          id="topmenu__bar"
          class="topmenu__bar"
          type="text"
          placeholder="Search"
        />
        <button
          class="topmenu__btn"
          id="refresh"
          alt="refresh option"
          title="refresh"
        >
          <i
            class="fa fa-refresh topmenu_optn topmenu__optn--refresh"
            aria-hidden="true"
          ></i>
        </button>
        <i
          class="fa fa-list topmenu__optn"
          aria-hidden="true"
          alt="list view option"
          title="list view"
        ></i>
      </div>
    </header>
    <hr />

    <div class="content">
      <aside class="leftmenu">
        <!--The <aside> content is placed as a sidebar in a document.-->
        <button class="leftmenu__optn" id="notes-section">Notes Section</button>
        <button class="leftmenu__optn" id="trash-section">Trash Section</button>
      </aside>
      <section class="notes">
        <div class="notes__create">
          <input
            class="notes__create-bar"
            id="createNote"
            type="text"
            placeholder="Take a note..."
            title="Create a note"
          />
        </div>
        <div class="notes__title notes__title--pinned">Pinned Notes</div>
        <div class="notes__pinned"></div>
        <div class="notes__title">Notes</div>
        <div class="notes__layout"></div>
        <div class="notes__title notes__title--trash">Trash Notes</div>
        <div class="notes__trash"></div>
      </section>
    </div>

    <div id="popupOverlay" class="popup-overlay hide"></div>
    <!-- Popup Message -->
    <div id="popupContainer" class="popup hide">
      <span class="close-btn">&times;</span>
      <div class="popup__inner">
        <input
          id="notetitle"
          class="popup__input"
          type="text"
          placeholder="Title"
          title="Enter title"
        />
      </div>
      <div class="popup__inner--descrp">
        <!-- <input
          id="notedescription"
          class="popup__input--descrp"
          type="text"
          placeholder="Enter note here..."
          title="Enter title"
        /> -->
        <textarea
          id="notedescription"
          class="popup__input--descrp"
          placeholder="Enter note here..."
          title="Enter description"
        ></textarea>
      </div>
      <div class="popup__inner popup__inner--button">
        <button class="popup__btn" id="createNoteButton">
          <img
            class="popup__create"
            src="https://th.bing.com/th/id/OIP.8lqMi2Rh8T3Ci55WoGF2PwHaF8?rs=1&pid=ImgDetMain"
            alt="create"
            title="Create note"
          />
        </button>
      </div>
    </div>

    <div id="popupContainer-edit" class="popup hide">
      <span class="close-btn">&times;</span>
      <div class="popup__inner">
        <input
          id="notetitle-edit"
          class="popup__edit"
          type="text"
          title="title"
        />
      </div>
      <div class="popup__inner">
        <!-- <input
          type="text"
          id="notedescription-edit"
          class="popup__edit--descrp"
          title="description"
        /> -->
        <div id="notedescription-edit" class="popup__edit--descrp"></div>
      </div>
      <div class="popup__inner popup__inner--button">
        <button class="popup__btn" id="editNoteButton">
          <img
            class="popup__create"
            src="https://th.bing.com/th/id/OIP.8lqMi2Rh8T3Ci55WoGF2PwHaF8?rs=1&pid=ImgDetMain"
            alt="edit"
            title="Edit note"
          />
        </button>
      </div>
    </div>

    <!-- Loading Spinner -->
    <div id="spinner-overlay" class="spinner-overlay" style="display: none">
      <div class="spinner"></div>
    </div>

    <script type="module" src="/src/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
  </body>
</html>
